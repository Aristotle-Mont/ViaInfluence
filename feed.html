<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ViaDice — Featured Picks</title>
<style>
  :root{
    --bg-deep: #0E1117;
    --bg-surface: #161A22;
    --bg-card: #1C212C;
    --bg-card-hover: #222838;
    --line: rgba(255,255,255,0.08);
    --line-strong: rgba(255,255,255,0.14);

    --ink-high: #F4F2EC;
    --ink-mid: #A8AEBC;
    --ink-low: #6B7180;

    --accent-week: #E8543E;
    --accent-month: #C9A24B;
    --accent-gem: #4FA694;
    --accent-trend: #7C7CE0;

    --face-display: 'Fraunces', Georgia, serif;
    --face-body: 'Inter', -apple-system, sans-serif;
    --face-mono: 'IBM Plex Mono', monospace;

    --radius-lg: 22px;
    --radius-md: 14px;
    --radius-sm: 8px;
  }

  *{box-sizing:border-box; margin:0; padding:0;}
  body{ background: var(--bg-deep); color: var(--ink-high); font-family: var(--face-body); min-height: 100vh; -webkit-font-smoothing: antialiased; }

  .wrap{ max-width: 480px; margin: 0 auto; min-height: 100vh; }

  .app-header{ padding: 28px 20px 18px; border-bottom: 1px solid var(--line); }
  .app-header .eyebrow{ font-family: var(--face-mono); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-low); margin-bottom: 6px; }
  .app-header h1{ font-family: var(--face-display); font-weight: 600; font-size: 28px; letter-spacing: -0.01em; }
  .app-header p{ color: var(--ink-mid); font-size: 14px; margin-top: 6px; }

  .feed{ padding: 18px 16px 60px; display:flex; flex-direction:column; gap: 16px; }

  .section-label{ padding: 22px 16px 4px; font-family: var(--face-mono); font-size: 11px; letter-spacing: 0.1em; text-transform:uppercase; color: var(--ink-low); }

  .pick-card{ position: relative; background: var(--bg-card); border: 1px solid var(--line); border-radius: var(--radius-lg); overflow: hidden; }

  .die-tab{ position:absolute; top:14px; left:14px; z-index:2; width:40px; height:40px; border-radius: 10px; display:flex; align-items:center; justify-content:center; font-family: var(--face-mono); font-weight:600; font-size: 10px; letter-spacing: 0.02em; box-shadow: 0 4px 14px rgba(0,0,0,0.35); backdrop-filter: blur(6px); }
  .pick-card.week .die-tab{ background: rgba(232,84,62,0.18); color: var(--accent-week); border:1px solid rgba(232,84,62,0.4); }
  .pick-card.month .die-tab{ background: rgba(201,162,75,0.18); color: var(--accent-month); border:1px solid rgba(201,162,75,0.4); }
  .pick-card.gem .die-tab{ background: rgba(79,166,148,0.18); color: var(--accent-gem); border:1px solid rgba(79,166,148,0.4); }
  .pick-card.trend .die-tab{ background: rgba(124,124,224,0.18); color: var(--accent-trend); border:1px solid rgba(124,124,224,0.4); }

  .pick-photo{ width:100%; height: 190px; object-fit: cover; display:block; background: var(--bg-card-hover); }
  .pick-photo.placeholder{ display:flex; align-items:center; justify-content:center; color: var(--ink-low); font-size:12px; font-family: var(--face-mono); }

  .pick-body{ padding: 16px 16px 18px; }
  .pick-kicker{ font-family: var(--face-mono); font-size: 10.5px; letter-spacing:0.08em; text-transform:uppercase; margin-bottom: 8px; display:flex; align-items:center; gap:8px; }
  .pick-card.week .pick-kicker{ color: var(--accent-week); }
  .pick-card.month .pick-kicker{ color: var(--accent-month); }
  .pick-card.gem .pick-kicker{ color: var(--accent-gem); }
  .pick-card.trend .pick-kicker{ color: var(--accent-trend); }
  .pick-kicker .expiry{ color: var(--ink-low); font-weight:400; }

  .pick-dish{ font-family: var(--face-display); font-size: 21px; font-weight:600; margin-bottom:3px; }
  .pick-restaurant{ color: var(--ink-mid); font-size: 13.5px; margin-bottom: 12px; }
  .pick-quote{ font-size: 14px; line-height:1.5; color: var(--ink-high); border-left: 2px solid var(--line-strong); padding-left: 12px; margin-bottom:14px; }

  .creator-row{ display:flex; align-items:center; gap:10px; padding-top:12px; border-top:1px solid var(--line); }
  .creator-avatar{ width:30px; height:30px; border-radius:50%; background: var(--bg-card-hover); display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:600; flex-shrink:0; border:1px solid var(--line-strong); overflow:hidden; }
  .creator-avatar img{ width:100%; height:100%; object-fit:cover; }
  .creator-name{ font-size: 13px; font-weight:600; }
  .creator-handle{ font-size:12px; color: var(--ink-low); }
  .verified{ width:14px; height:14px; border-radius:50%; background: var(--accent-gem); display:inline-flex; align-items:center; justify-content:center; margin-left:4px; }
  .verified svg{ width:8px; height:8px; }
  .roll-cta{ margin-left:auto; font-family: var(--face-mono); font-size: 11px; letter-spacing:0.04em; color: var(--ink-mid); }

  /* Empty / loading states */
  .state-block{ padding: 60px 28px; text-align:center; }
  .state-block .icon{ font-size: 28px; margin-bottom: 14px; opacity:0.45; }
  .state-block h3{ font-family: var(--face-display); font-size: 18px; font-weight:600; margin-bottom: 8px; }
  .state-block p{ color: var(--ink-low); font-size: 13.5px; line-height: 1.6; max-width: 320px; margin: 0 auto; }

  .skeleton{ background: linear-gradient(90deg, var(--bg-card) 25%, var(--bg-card-hover) 37%, var(--bg-card) 63%); background-size: 400% 100%; animation: shimmer 1.4s ease infinite; border-radius: var(--radius-lg); height: 280px; }
  @keyframes shimmer{ 0%{background-position:100% 50%;} 100%{background-position:0 50%;} }
</style>
</head>
<body>

<div class="wrap">
  <div class="app-header">
    <div class="eyebrow">ViaDice · Curated</div>
    <h1>Featured Picks</h1>
    <p>Chosen by people who actually eat around here.</p>
  </div>

  <div id="feedRoot">
    <!-- JS renders sections + cards here. Loading skeleton shown first. -->
    <div class="feed">
      <div class="skeleton"></div>
      <div class="skeleton"></div>
    </div>
  </div>
</div>

<!-- ============================================================
     Firebase wiring — replace firebaseConfig with your project's values
     (Firebase Console → Project Settings → General → Your apps → SDK config)
     ============================================================ -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, query, where, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  // TODO: paste your config from Firebase Console here
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_PROJECT.appspot.com",
    messagingSenderId: "YOUR_SENDER_ID",
    appId: "YOUR_APP_ID"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const TYPE_LABELS = {
    week:    { kicker: "Food of the Week",  tab: "WK" },
    month:   { kicker: "Food of the Month", tab: "MO" },
    gem:     { kicker: "Hidden Gem",        tab: "GEM" },
    trending:{ kicker: "Trending Now",      tab: "TR" }
  };

  function fmtExpiry(ts){
    if(!ts) return "";
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    return "ends " + d.toLocaleDateString(undefined, { month:'short', day:'numeric' });
  }

  function cardHTML(post, creator){
    const t = TYPE_LABELS[post.type] || { kicker: post.type, tab: "?" };
    const photo = post.photoUrl
      ? `<img class="pick-photo" src="${post.photoUrl}" alt="${post.dish || ''}">`
      : `<div class="pick-photo placeholder">no photo</div>`;
    const avatar = creator?.avatarUrl
      ? `<img src="${creator.avatarUrl}" alt="">`
      : (creator?.displayName || "?").charAt(0).toUpperCase();
    const verifiedBadge = creator?.verified
      ? `<span class="verified"><svg viewBox="0 0 24 24" fill="white"><path d="M9 16.2L4.8 12l-1.4 1.4L9 19 21 7l-1.4-1.4z"/></svg></span>`
      : "";

    return `
      <div class="pick-card ${post.type}">
        <div class="die-tab"><span>${t.tab}</span></div>
        ${photo}
        <div class="pick-body">
          <div class="pick-kicker">${t.kicker} <span class="expiry">· ${fmtExpiry(post.expiresAt)}</span></div>
          <div class="pick-dish">${post.dish || ""}</div>
          <div class="pick-restaurant">${post.restaurant || ""}</div>
          ${post.quote ? `<div class="pick-quote">"${post.quote}"</div>` : ""}
          <div class="creator-row">
            <div class="creator-avatar">${avatar}</div>
            <div>
              <div class="creator-name">${creator?.displayName || "Unknown creator"}${verifiedBadge}</div>
              <div class="creator-handle">${creator?.followerCount ? creator.followerCount.toLocaleString() + " followers" : ""}</div>
            </div>
            <div class="roll-cta">View spot →</div>
          </div>
        </div>
      </div>`;
  }

  function emptyStateHTML(){
    return `
      <div class="state-block">
        <div class="icon">◇</div>
        <h3>No picks live right now</h3>
        <p>Featured creators haven't published anything yet. Check back soon — or invite your first creator from the portal.</p>
      </div>`;
  }

  async function loadFeed(){
    const root = document.getElementById('feedRoot');
    try{
      const postsQuery = query(
        collection(db, "creatorPosts"),
        where("status", "==", "published"),
        orderBy("publishedAt", "desc")
      );
      const snap = await getDocs(postsQuery);

      if (snap.empty){
        root.innerHTML = emptyStateHTML();
        return;
      }

      // Fetch creator profiles for each post (small N, fine to do individually)
      const creatorCache = {};
      const posts = [];
      for (const docSnap of snap.docs){
        const post = { id: docSnap.id, ...docSnap.data() };
        posts.push(post);
      }

      const { getDoc, doc } = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js");
      for (const post of posts){
        if (!creatorCache[post.creatorId]){
          const cDoc = await getDoc(doc(db, "creators", post.creatorId));
          creatorCache[post.creatorId] = cDoc.exists() ? cDoc.data() : null;
        }
      }

      const byType = {};
      posts.forEach(p => { (byType[p.type] = byType[p.type] || []).push(p); });

      let html = "";
      const order = ["week", "month", "gem", "trending"];
      order.forEach(type => {
        if (!byType[type] || !byType[type].length) return;
        html += `<div class="section-label">${TYPE_LABELS[type].kicker}</div><div class="feed">`;
        byType[type].forEach(p => { html += cardHTML(p, creatorCache[p.creatorId]); });
        html += `</div>`;
      });

      root.innerHTML = html || emptyStateHTML();

    } catch(err){
      console.error("Failed to load Featured Picks:", err);
      root.innerHTML = `
        <div class="state-block">
          <div class="icon">!</div>
          <h3>Couldn't load picks</h3>
          <p>Something went wrong fetching the feed. Pull to refresh, or try again shortly.</p>
        </div>`;
    }
  }

  loadFeed();
</script>

</body>
</html>
